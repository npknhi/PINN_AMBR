name: pinn_gpu
channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel

  - numpy>=1.26
  - scipy>=1.11
  - pandas
  - matplotlib
  - scikit-learn
  - h5py
  - tqdm

  - jupyterlab
  - ipykernel
  - ipywidgets

  - requests
  - pyyaml
  - git
  - gitpython

  - pip:
      - jinns==1.7.1
      - optax
      - equinox
      - tensorflow-probability

      
      - "jax[cuda12]>=0.8.1"